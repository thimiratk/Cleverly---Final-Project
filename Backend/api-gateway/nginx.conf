# Nginx API Gateway Configuration

events {
    worker_connections 1024;
}

http {
    # Upstream definitions for each service
    upstream rule_based_fraud_detection {
        server localhost:8001;
    }

    upstream ml_based_fraud_detection {
        server localhost:8002;
    }

    upstream sentiment_analysis {
        server localhost:8003;
    }

    # Rate limiting zone (prevents abuse)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Main server configuration
    server {
        listen 80;
        server_name localhost;

        # Enable CORS
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;

        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Health check endpoint
        location /health {
            return 200 "API Gateway is healthy\n";
            add_header Content-Type text/plain;
        }

        # Rule-based Fraud Detection Service
        location /api/rule-fraud/ {
            limit_req zone=api_limit burst=20 nodelay;
            
            rewrite ^/api/rule-fraud/(.*) /$1 break;
            proxy_pass http://rule_based_fraud_detection;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ML-based Fraud Detection Service
        location /api/ml-fraud/ {
            limit_req zone=api_limit burst=20 nodelay;
            
            rewrite ^/api/ml-fraud/(.*) /$1 break;
            proxy_pass http://ml_based_fraud_detection;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Sentiment Analysis Service
        location /api/sentiment/ {
            limit_req zone=api_limit burst=20 nodelay;
            
            rewrite ^/api/sentiment/(.*) /$1 break;
            proxy_pass http://sentiment_analysis;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts - longer for ML model
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # Default route - API documentation
        location / {
            return 200 '{
                "message": "Cleverly API Gateway",
                "version": "1.0.0",
                "endpoints": {
                    "rule_fraud_detection": {
                        "detect": "POST /api/rule-fraud/detect",
                        "detect_coordinated": "POST /api/rule-fraud/detect-coordinated"
                    },
                    "ml_fraud_detection": {
                        "detection": "POST /api/ml-fraud/detection"
                    },
                    "sentiment_analysis": {
                        "sentiment": "POST /api/sentiment/sentiment"
                    }
                }
            }\n';
            add_header Content-Type application/json;
        }
    }
}
